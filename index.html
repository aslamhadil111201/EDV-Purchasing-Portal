<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procurement Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg:         #08090c;
  --c-surface:    #0f1117;
  --c-raised:     #161b26;
  --c-border:     rgba(255,255,255,0.07);
  --c-border-md:  rgba(255,255,255,0.12);
  --c-border-hi:  rgba(255,255,255,0.2);
  --c-text:       #eef2f8;
  --c-muted:      #5a6a82;
  --c-sub:        #8a9bb8;
  --c-lime:       #00c4a0;
  --c-lime-dim:   rgba(0,196,160,0.10);
  --c-lime-glow:  rgba(0,196,160,0.18);
  --c-blue:       #4f9dff;
  --c-blue-dim:   rgba(79,157,255,0.1);
  --c-amber:      #f5a623;
  --c-amber-dim:  rgba(245,166,35,0.1);
  --c-rose:       #ff5c7a;
  --c-rose-dim:   rgba(255,92,122,0.1);
  --c-violet:     #a77bff;
  --c-violet-dim: rgba(167,123,255,0.1);
  --c-cyan:       #38e8c4;
  --c-cyan-dim:   rgba(56,232,196,0.1);
  --c-orange:     #ff8c42;
  --c-orange-dim: rgba(255,140,66,0.1);
  --c-red:        #ff4d4d;
  --c-red-dim:    rgba(255,77,77,0.1);
  --sidebar-w:    260px;
  --top-h:        64px;
  --radius-sm:    8px;
  --radius-md:    12px;
  --radius-lg:    16px;
  --radius-xl:    20px;
  --font-head:    'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}

[data-theme="light"] {
  --c-bg:         #f3f5f8;
  --c-surface:    #ffffff;
  --c-raised:     #f8fafc;
  --c-border:     rgba(0,0,0,0.07);
  --c-border-md:  rgba(0,0,0,0.12);
  --c-border-hi:  rgba(0,0,0,0.2);
  --c-text:       #0d1420;
  --c-muted:      #94a3b8;
  --c-sub:        #5a6a82;
  --c-lime:       #00957a;
  --c-lime-dim:   rgba(0,149,122,0.08);
  --c-lime-glow:  rgba(0,149,122,0.18);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-border-md); border-radius: 4px; }

.topbar {
  position: fixed; top:0; left:0; right:0; z-index:200;
  height: var(--top-h);
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.topbar-logo {
  display: flex; align-items: center; gap: 10px;
  width: var(--sidebar-w);
  flex-shrink: 0;
  padding-right: 16px;
  border-right: 1px solid var(--c-border);
  height: 100%;
}
.logo-mark {
  width: 36px; height: 36px;
  background: var(--c-lime);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.logo-mark::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
}
.logo-mark svg { position: relative; z-index: 1; }
.logo-text { font-family: var(--font-head); }
.logo-name { font-size: 12px; font-weight: 700; color: var(--c-text); letter-spacing: -0.2px; line-height: 1.3; }
.logo-tag  { font-size: 9px; color: var(--c-lime); font-weight: 600; letter-spacing: 0.3px; }

.search-wrap {
  flex: 1; max-width: 400px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-md);
  color: var(--c-text);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 9px 44px 9px 40px;
  outline: none;
  transition: border-color .2s, background .2s;
}
.search-wrap input:focus {
  border-color: var(--c-lime);
  background: var(--c-surface);
}
.search-wrap input::placeholder { color: var(--c-muted); }
.search-icon-el {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--c-muted);
}
.search-kbd-el {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px; color: var(--c-muted);
  background: var(--c-bg);
  border: 1px solid var(--c-border-md);
  border-radius: 4px; padding: 2px 5px;
}

.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.hamburger-btn {
  display: none;
  width: 36px; height: 36px;
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--c-sub);
}
.hamburger-btn:hover { background: var(--c-border); color: var(--c-text); }
.hamburger-btn svg { display: block; }

.icon-btn {
  width: 36px; height: 36px;
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  color: var(--c-sub);
  font-size: 15px;
  user-select: none;
  position: relative;
}
.icon-btn:hover { background: var(--c-border); border-color: var(--c-border-md); color: var(--c-text); }

.user-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: 10px;
  padding: 5px 10px 5px 5px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.user-chip:hover { background: var(--c-border); border-color: var(--c-border-md); }
.user-avatar {
  width: 28px; height: 28px;
  background: var(--c-lime);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 12px; font-weight: 700;
  color: #001a15;
  flex-shrink: 0;
}
.user-meta { line-height: 1.2; }
.user-name-el { font-size: 12px; font-weight: 500; }
.user-role-el { font-size: 10px; color: var(--c-muted); }

.live-dot {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; font-family: var(--font-mono);
  color: var(--c-lime);
  background: var(--c-lime-dim);
  border: 1px solid rgba(0,196,160,0.2);
  border-radius: 20px; padding: 3px 10px;
}
.live-dot::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c-lime);
  animation: blink 1.2s step-end infinite;
}

.sidebar {
  position: fixed;
  left: 0; top: var(--top-h); bottom: 0;
  width: var(--sidebar-w);
  background: var(--c-surface);
  border-right: 1px solid var(--c-border);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  z-index: 100;
  padding: 14px 10px;
  transition: transform .3s ease;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--c-border-md); }

.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 99;
  background: rgba(0,0,0,0.5);
}
.sidebar-overlay.visible { display: block; }

.nav-section-label {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--c-muted); text-transform: uppercase;
  padding: 8px 10px 6px;
  font-family: var(--font-head);
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius-md);
  cursor: pointer;
  transition: background .15s, color .15s;
  color: var(--c-sub);
  font-size: 13px; font-weight: 400;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--c-raised); color: var(--c-text); }
.nav-item.active { background: var(--c-lime-dim); color: var(--c-lime); }
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; background: var(--c-lime);
  border-radius: 0 3px 3px 0;
}

.nav-icon-wrap {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  background: var(--c-raised);
  font-size: 14px;
  flex-shrink: 0;
  transition: background .15s;
}
.nav-item.active .nav-icon-wrap { background: var(--c-lime-dim); }
.nav-item-count {
  margin-left: auto;
  font-size: 10px; font-family: var(--font-mono);
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: 10px; padding: 1px 7px;
  color: var(--c-muted);
}
.nav-item.active .nav-item-count { background: var(--c-lime-dim); color: var(--c-lime); border-color: var(--c-lime-dim); }

.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--top-h);
  padding: 28px 32px;
  min-height: calc(100vh - var(--top-h));
}

.home-hero {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 32px;
  gap: 20px;
}
.hero-left h1 {
  font-family: var(--font-head);
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px; line-height: 1.2;
  margin-bottom: 6px;
}
.hero-left h1 span { color: var(--c-lime); }
.hero-left p { color: var(--c-sub); font-size: 13px; font-weight: 300; }

.clock-card {
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 14px 20px;
  min-width: 200px;
  text-align: right;
  flex-shrink: 0;
}
.clock-date { font-size: 11px; color: var(--c-sub); margin-bottom: 4px; font-weight: 300; }
.clock-time {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 500;
  color: var(--c-text);
  letter-spacing: 2px;
}
.clock-pulse {
  display: inline-block; width: 6px; height: 6px;
  background: var(--c-lime); border-radius: 50%;
  margin-right: 8px; margin-bottom: 2px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity:0; } }

.stat-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .2s;
  cursor: default;
}
.stat-card:hover { border-color: var(--c-border-md); transform: translateY(-2px); }
.stat-card::after {
  content: '';
  position: absolute;
  bottom: -30px; right: -30px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--accent, rgba(255,255,255,0.03));
}
.stat-label { font-size: 11px; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 10px; font-family: var(--font-head); }
.stat-value { font-family: var(--font-head); font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--c-text); }
.stat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500; margin-top: 6px;
  padding: 2px 8px; border-radius: 20px;
}

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--font-head);
  font-size: 12px; font-weight: 600;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--c-muted);
}
.section-pill {
  font-size: 11px; color: var(--c-sub);
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: 20px; padding: 3px 10px;
  font-family: var(--font-mono);
}

.bento-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: auto;
  gap: 10px;
  margin-bottom: 32px;
}

.bento-card {
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex; flex-direction: column;
  cursor: pointer;
  text-decoration: none; color: inherit;
  transition: border-color .2s, transform .2s, background .2s;
  position: relative; overflow: hidden;
  min-height: 120px;
}
.bento-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--accent, transparent);
  opacity: 0;
  transition: opacity .2s;
}
.bento-card:hover {
  border-color: var(--c-border-md);
  transform: translateY(-3px);
  background: var(--c-surface);
}
.bento-card:hover::before { opacity: 1; }

.bento-icon {
  width: 38px; height: 38px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 14px;
  flex-shrink: 0;
}
.bento-label { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
.bento-sub   { font-size: 10px; color: var(--c-muted); font-weight: 300; line-height: 1.4; flex: 1; }
.bento-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--c-border);
}
.bento-tag {
  font-size: 9px; font-family: var(--font-mono); color: var(--c-muted);
  background: var(--c-bg); border: 1px solid var(--c-border);
  border-radius: 4px; padding: 2px 6px; text-transform: uppercase;
}
.bento-arrow {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--c-muted); font-size: 12px;
  transition: background .2s, color .2s, border-color .2s;
}
.bento-card:hover .bento-arrow {
  background: var(--accent, var(--c-lime));
  color: #001a15;
  border-color: transparent;
}

/* MODULE VIEW */
.module-hero {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--c-border);
}
.module-icon-xl {
  width: 52px; height: 52px;
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  border: 1px solid var(--c-border-md);
  flex-shrink: 0;
}
.module-meta h2 {
  font-family: var(--font-head);
  font-size: 20px; font-weight: 700; letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.module-meta p { font-size: 12px; color: var(--c-muted); font-weight: 300; }

.module-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  align-items: stretch;
}

.module-doc {
  background: var(--c-raised);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 22px 16px 14px 16px;
  display: flex; align-items: center; gap: 12px;
  text-decoration: none; color: inherit;
  transition: background .15s, border-color .2s, transform .15s;
  position: relative; overflow: hidden;
  min-width: 0;
  height: 100%;
  box-sizing: border-box;
}
.module-doc::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: var(--doc-accent, var(--c-lime));
  opacity: 0;
  transition: opacity .2s;
}
.module-doc:hover {
  background: var(--c-surface);
  border-color: var(--c-border-md);
  transform: translateX(4px);
}
.module-doc:hover::after { opacity: 1; }
.doc-icon {
  width: 38px; height: 38px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  transition: border-color .2s;
}
.module-doc:hover .doc-icon { border-color: var(--c-border-md); }
.doc-info { flex: 1; min-width: 0; overflow: hidden; }
.doc-name {
  font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.doc-type {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--c-muted); font-family: var(--font-mono);
}
.doc-type::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #0f9d58;
  flex-shrink: 0;
}
.doc-arrow-btn {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--c-muted); font-size: 14px;
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.module-doc:hover .doc-arrow-btn {
  background: var(--doc-accent, var(--c-lime));
  color: #001a15;
  border-color: transparent;
}

.doc-index {
  position: absolute; top: 6px; left: 8px;
  font-family: var(--font-mono); font-size: 9px;
  color: var(--c-border-hi);
}

.search-hero {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap;
}
.search-badge {
  background: var(--c-lime-dim); color: var(--c-lime);
  border: 1px solid rgba(0,196,160,0.2);
  border-radius: var(--radius-sm);
  font-size: 10px; font-family: var(--font-mono);
  padding: 4px 10px;
}

.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--c-muted);
  margin-bottom: 20px;
  font-family: var(--font-mono);
  flex-wrap: wrap;
}
.breadcrumb span:last-child { color: var(--c-text); }
.breadcrumb-sep { color: var(--c-border-md); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.anim-up  { animation: fadeUp  .35s cubic-bezier(.22,.68,0,1.2) both; }
.anim-in  { animation: fadeIn  .25s ease both; }
.d1 { animation-delay: .05s; }
.d2 { animation-delay: .10s; }
.d3 { animation-delay: .15s; }
.d4 { animation-delay: .20s; }
.d5 { animation-delay: .25s; }

@media (max-width: 1024px) {
  :root { --sidebar-w: 220px; }
  .bento-grid { grid-template-columns: repeat(3, 1fr); }
  .module-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-strip { grid-template-columns: repeat(2, 1fr); }
  .logo-tag { display: none; }
  .search-wrap { max-width: 260px; }
  .main { padding: 20px 20px; }
}

@media (max-width: 768px) {
  :root { --top-h: 56px; }
  .hamburger-btn { display: flex; }
  .topbar-logo { border-right: none; padding-right: 0; width: auto; }
  .logo-text { display: none; }
  .live-dot { display: none; }
  .search-kbd-el { display: none; }
  .search-wrap { max-width: 100%; flex: 1; }
  .search-wrap input { padding: 8px 12px 8px 36px; font-size: 13px; }
  .sidebar {
    transform: translateX(-100%);
    width: 260px; z-index: 300;
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; }
  .home-hero { flex-direction: column; gap: 14px; margin-bottom: 20px; }
  .hero-left h1 { font-size: 20px; }
  .clock-card { text-align: left; min-width: unset; width: 100%; padding: 12px 16px; }
  .clock-time { font-size: 18px; letter-spacing: 1px; }
  .stat-strip { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat-card { padding: 14px; }
  .stat-value { font-size: 22px; }
  .stat-label { font-size: 10px; margin-bottom: 6px; }

  { icon:"🔧", label:"PR Consumable",              accent:"#4f9dff", link:"https://docs.google.com/spreadsheets/d/1NS5g0bIJiad2YTZHI6fqV-pPmxHsUA1eoqsNwDwAXbI/edit?usp=drivesdk", sub:"Purchase Requisition",    tag:"pr" },
  { icon:"🔩", label:"Stock Welding Rod",          accent:"#ff8c42", link:"https://docs.google.com/spreadsheets/d/1Z7ozcZuKQafwXWL6N1IOQYTBAX1_wjtlvLR_f4q2NfY/edit?gid=1513723200#gid=1513723200", sub:"Stock Inventory",         tag:"stock" },
  { icon:"🌐", label:"Import Status",              accent:"#a77bff", link:"https://docs.google.com/spreadsheets/d/1r88DwdKyYX1CbDcjnkH7fEQ6jZpFTACsBC0UsQ26kWE/edit?usp=drivesdk", sub:"Logistic Monitor",        tag:"import" },
  { icon:"⚠️", label:"NCR Material Log",          accent:"#ff4d4d", link:"https://docs.google.com/spreadsheets/d/1yM63hixDFhu6R2lTZGkqwASoHnYTsynorxYq82DLz1g/edit?usp=drivesdk", sub:"Quality / ISO 9001",      tag:"ncr" },
  { icon:"📦", label:"Stock Material Inventory",  accent:"#00c4a0", link:"https://docs.google.com/spreadsheets/d/1_7eOxZDZyA4UApD3dddzga6RGoWjXK7PNUawlxnYNL8/edit?gid=223485245#gid=223485245", sub:"Warehouse Stock",         tag:"stock" },
  { icon:"🏗️", label:"Plant 2 MS — EDV",          accent:"#38e8c4", link:"https://docs.google.com/spreadsheets/d/1dqNHXJrT8OwxOHpvh9nuIXk7L_Erv36xCDMBr9R_k1g/edit?gid=0#gid=0", sub:"MS Plant 2",              tag:"plant-2" }
];

let activeNav = null;

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const homeEl = navItem('⌂', 'Dashboard', () => { setNav(homeEl); loadHome(); closeSidebar(); });
  nav.appendChild(homeEl);
  const sep = document.createElement('div');
  sep.className = 'nav-section-label';
  sep.textContent = 'Modules';
  nav.appendChild(sep);
  Object.entries(MENU).forEach(([name, d]) => {
    const el = navItem(d.icon, name, () => { setNav(el); loadModule(name); closeSidebar(); }, d.items.length);
    nav.appendChild(el);
  });
  setNav(homeEl);
}

function navItem(icon, label, fn, count) {
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.innerHTML = `<div class="nav-icon-wrap">${icon}</div><span style="flex:1">${label}</span>${count ? `<span class="nav-item-count">${count}</span>` : ''}`;
  el.onclick = fn;
  return el;
}

function setNav(el) {
  if (activeNav) activeNav.classList.remove('active');
  el.classList.add('active'); activeNav = el;
}

function openSidebar() {
  document.getElementById('sidebarNav').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebarNav').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

document.getElementById('hamburgerBtn').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebarNav');
  if (sidebar.classList.contains('open')) closeSidebar();
  else openSidebar();
});

document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

function fmtDate() {
  return new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function fmtTime() {
  return new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
}

function loadHome() {
  const totalDocs = Object.values(MENU).reduce((s, d) => s + d.items.length, 0);
  const totalMods = Object.keys(MENU).length;

  document.getElementById('content').innerHTML = `
    <div class="home-hero anim-up">
      <div class="hero-left">
        <h1>Selamat datang 👋</h1>
        <p>Integrated Procurement Hub — kelola semua aktivitas pengadaan dalam satu tempat.</p>
      </div>
      <div class="clock-card">
        <div class="clock-date" id="clkDate">${fmtDate()}</div>
        <div class="clock-time"><span class="clock-pulse"></span><span id="clkTime">${fmtTime()}</span></div>
      </div>
    </div>

    <div class="stat-strip anim-up d1">
      <div class="stat-card" style="--accent:var(--c-lime-dim)">
        <div class="stat-label">Total Modules</div>
        <div class="stat-value">${totalMods}</div>
        <div class="stat-badge" style="background:var(--c-lime-dim);color:var(--c-lime)">▲ Active</div>
      </div>
      <div class="stat-card" style="--accent:var(--c-blue-dim)">
        <div class="stat-label">Total Dokumen</div>
        <div class="stat-value">${totalDocs}</div>
        <div class="stat-badge" style="background:var(--c-blue-dim);color:var(--c-blue)">● All Linked</div>
      </div>
      <div class="stat-card" style="--accent:var(--c-cyan-dim)">
        <div class="stat-label">Material Projects</div>
        <div class="stat-value">${MENU['Material Status'].items.length}</div>
        <div class="stat-badge" style="background:var(--c-cyan-dim);color:var(--c-cyan)">📡 Live</div>
      </div>
      <div class="stat-card" style="--accent:var(--c-amber-dim)">
        <div class="stat-label">Quick Access</div>
        <div class="stat-value">${QUICK.length}</div>
        <div class="stat-badge" style="background:var(--c-amber-dim);color:var(--c-amber)">⚡ Pinned</div>
      </div>
    </div>

    <div class="anim-up d2">
      <div class="section-header">
        <div class="section-title">Quick Access</div>
        <div class="section-pill">${QUICK.length} shortcuts</div>
      </div>
      <div class="bento-grid">
        ${QUICK.map((q) => {
          const href  = q.link || '#';
          const click = q.cat ? `onclick="goModule('${q.cat}');return false;"` : '';
          return `
          <a href="${href}" ${q.link ? 'target="_blank"' : ''} ${click}
             class="bento-card" style="--accent:${q.accent}">
            <div class="bento-icon" style="background:${q.accent}22;color:${q.accent};">${q.icon}</div>
            <div class="bento-label">${q.label}</div>
            <div class="bento-sub">${q.sub}</div>
            <div class="bento-footer">
              <div class="bento-tag">${q.tag}</div>
              <div class="bento-arrow">→</div>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>
  `;

  clearInterval(window._clk);
  window._clk = setInterval(() => {
    const t = document.getElementById('clkTime');
    if (t) t.textContent = fmtTime();
  }, 1000);
}

function loadModule(name) {
  const d = MENU[name];
  const isMat = name === 'Material Status';

  document.getElementById('content').innerHTML = `
    <div class="breadcrumb anim-in">
      <span>Purchasing Portal</span>
      <span class="breadcrumb-sep">/</span>
      <span>${name}</span>
    </div>
    <div class="module-hero anim-up">
      <div class="module-icon-xl" style="background:${d.bg};border-color:${d.accent}33">${d.icon}</div>
      <div class="module-meta">
        <h2>${name}</h2>
        <p>${d.desc} · <strong style="color:var(--c-text)">${d.items.length} dokumen</strong></p>
      </div>
      ${isMat ? `
      <a href="${d.driveFolder}" target="_blank" style="
        margin-left:auto; display:inline-flex; align-items:center; gap:8px;
        background:var(--c-raised); border:1px solid var(--c-border-md);
        border-radius:var(--radius-md); padding:9px 16px;
        text-decoration:none; color:var(--c-text);
        font-size:12px; font-weight:500; font-family:var(--font-body);
        transition:background .15s, border-color .15s, color .15s;
        flex-shrink:0;
      "
      onmouseover="this.style.background='rgba(56,232,196,0.12)';this.style.borderColor='rgba(56,232,196,0.35)';this.style.color='#38e8c4'"
      onmouseout="this.style.background='var(--c-raised)';this.style.borderColor='var(--c-border-md)';this.style.color='var(--c-text)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Open Drive Folder
      </a>` : ''}
    </div>
    <div class="module-grid anim-up d1">
      ${d.items.map((item, i) => `
        <div style="position:relative;display:flex;flex-direction:column;">
          <a href="${item.link}" target="_blank" class="module-doc" style="--doc-accent:${d.accent};flex:1;${isMat ? 'padding-right:120px;' : ''}">
            <span class="doc-index">#${String(i+1).padStart(2,'0')}</span>
            <div class="doc-icon">${item.icon}</div>
            <div class="doc-info">
              <div class="doc-name">${item.name}</div>
              <div class="doc-type">${item.tag} · ${item.sub || 'Google Sheets'}</div>
            </div>
            ${!isMat ? '<div class="doc-arrow-btn">↗</div>' : ''}
          </a>
          ${isMat ? `
          <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:6px;align-items:center;pointer-events:all;">
            <a href="${item.link}" target="_blank" title="Buka Spreadsheet"
               style="width:30px;height:30px;border-radius:var(--radius-sm);background:var(--c-bg);border:1px solid var(--c-border);display:flex;align-items:center;justify-content:center;color:var(--c-muted);font-size:14px;text-decoration:none;transition:background .15s,color .15s,border-color .15s;"
               onmouseover="this.style.background='#38e8c4';this.style.color='#001a15';this.style.borderColor='transparent'"
               onmouseout="this.style.background='var(--c-bg)';this.style.color='var(--c-muted)';this.style.borderColor='var(--c-border)'">↗</a>
            <a href="${item.drive}" target="_blank" title="Buka Folder Drive"
               style="height:30px;padding:0 10px;border-radius:var(--radius-sm);background:var(--c-bg);border:1px solid var(--c-border);display:inline-flex;align-items:center;gap:5px;color:var(--c-muted);font-size:10px;font-family:var(--font-mono);text-decoration:none;white-space:nowrap;transition:background .15s,color .15s,border-color .15s;"
               onmouseover="this.style.background='rgba(56,232,196,0.12)';this.style.color='#38e8c4';this.style.borderColor='rgba(56,232,196,0.3)'"
               onmouseout="this.style.background='var(--c-bg)';this.style.color='var(--c-muted)';this.style.borderColor='var(--c-border)'">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              Drive
            </a>
          </div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function goModule(name) {
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.querySelector('span')?.textContent.trim() === name) setNav(el);
  });
  loadModule(name);
}

document.getElementById('searchInput').addEventListener('input', function () {
  const kw = this.value.trim().toLowerCase();
  if (!kw) { loadHome(); return; }
  const res = [];
  Object.entries(MENU).forEach(([mod, d]) => {
    d.items.forEach(item => {
      if (item.name.toLowerCase().includes(kw) || mod.toLowerCase().includes(kw))
        res.push({ ...item, mod, accent: d.accent });
    });
  });
  document.getElementById('content').innerHTML = `
    <div class="search-hero anim-up">
      <div style="font-size:22px">🔎</div>
      <div>
        <h2 style="font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:-0.3px">Hasil Pencarian</h2>
        <p style="font-size:12px;color:var(--c-muted);margin-top:3px;">"${this.value}" — ${res.length} dokumen ditemukan</p>
      </div>
      <div class="search-badge">${res.length} result${res.length!==1?'s':''}</div>
    </div>
    <div class="module-grid anim-up d1">
      ${res.length
        ? res.map((r, i) => `
          <a href="${r.link}" target="_blank" class="module-doc" style="--doc-accent:${r.accent}">
            <span class="doc-index">#${String(i+1).padStart(2,'0')}</span>
            <div class="doc-icon">${r.icon}</div>
            <div class="doc-info">
              <div class="doc-name">${r.name}</div>
              <div class="doc-type">${r.mod} · ${r.tag}</div>
            </div>
            <div class="doc-arrow-btn">↗</div>
          </a>`).join('')
        : '<p style="padding:24px;color:var(--c-muted);font-size:13px;">Tidak ada dokumen yang cocok.</p>'
      }
    </div>
  `;
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

const root = document.documentElement;
const saved = localStorage.getItem('procure-theme') || 'dark';
if (saved === 'light') root.setAttribute('data-theme', 'light');

document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = root.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('procure-theme', next);
});

buildSidebar();
loadHome();
</script>
</body>
</html>
